<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부부한의원 실시간 치료 현황판</title>
  <!-- Google Fonts: Outfit & Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Touch drag-and-drop polyfill for mobile/tablet support -->
  <script src="https://unpkg.com/drag-drop-touch@1.3.1/DragDropTouch.js"></script>
  <!-- Supabase JS SDK for Realtime database sync -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-logo">
        <span class="logo-icon">🩺</span>
        <h1>부부한의원 <span>실시간 치료 현황판</span></h1>
        <div id="live-clock" class="live-clock">2026-06-30 08:44:00</div>
      </div>
      
      <!-- Tabs for Floor Selection -->
      <div class="tabs-container">
        <button class="tab-btn active" data-tab="all">📋 전체보기</button>
        <button class="tab-btn" data-tab="floor1">1️⃣ 1층 치료실</button>
        <button class="tab-btn" data-tab="floor2">2️⃣ 2층 치료실</button>
      </div>

      <div class="header-status">
        <span class="status-indicator-active">● 실시간 연결됨</span>
        <div class="header-actions">
          <button id="btn-reset-all" class="btn-reset-all">🧹 전체 초기화</button>
          <button id="btn-sync-schedule" class="btn-sync-schedule">📅 일정 가져오기</button>
        </div>
      </div>
    </header>

    <main class="board-wrapper">

      <!-- 1st Floor Panel -->
      <div class="board-panel" id="panel-floor1">
        <div class="board-grid">
          <!-- Header Row -->
          <div class="grid-header left-header">
            <span>의료진</span>
          </div>

          <div class="grid-header female-header">
            <div class="ward-title-group">
              <span class="gender-badge female">여</span>
              <h2>여자 치료실</h2>
            </div>
          </div>
          
          <div class="grid-header male-header">
            <div class="ward-title-group">
              <span class="gender-badge male">남</span>
              <h2>남자 치료실</h2>
            </div>
          </div>

          <!-- Director 1 Row -->
          <div class="director-left-cell" data-row="1">
            <span class="director-tag" data-row="1">최보빈</span>
            <button class="leave-time-btn" data-row="1">퇴근시간</button>
          </div>

          <div class="slots-container" data-ward="female" data-director="1">
            <!-- slots dynamically generated by JS -->
          </div>
          
          <div class="slots-container" data-ward="male" data-director="1">
            <!-- slots dynamically generated by JS -->
          </div>

          <!-- Director 2 Row -->
          <div class="director-left-cell" data-row="2">
            <span class="director-tag" data-row="2">김준현</span>
            <button class="leave-time-btn" data-row="2">퇴근시간</button>
          </div>

          <div class="slots-container" data-ward="female" data-director="2">
            <!-- slots dynamically generated by JS -->
          </div>
          
          <div class="slots-container" data-ward="male" data-director="2">
            <!-- slots dynamically generated by JS -->
          </div>

          <!-- Director 3 Row -->
          <div class="director-left-cell" data-row="3">
            <span class="director-tag" data-row="3">김영윤</span>
            <button class="leave-time-btn" data-row="3">퇴근시간</button>
          </div>

          <div class="slots-container" data-ward="female" data-director="3">
            <!-- slots dynamically generated by JS -->
          </div>
          
          <div class="slots-container" data-ward="male" data-director="3">
            <!-- slots dynamically generated by JS -->
          </div>

          <!-- Director 4 Row -->
          <div class="director-left-cell" data-row="4">
            <span class="director-tag" data-row="4">박지현</span>
            <button class="leave-time-btn" data-row="4">퇴근시간</button>
          </div>

          <div class="slots-container" data-ward="female" data-director="4">
            <!-- slots dynamically generated by JS -->
          </div>
          
          <div class="slots-container" data-ward="male" data-director="4">
            <!-- slots dynamically generated by JS -->
          </div>
          <!-- Vertical Divider Lines -->
          <div class="vertical-divider line-1"></div>
          <div class="vertical-divider line-2"></div>
        </div>
      </div>

      <!-- 2nd Floor Panel -->
      <div class="board-panel" id="panel-floor2">
        <div class="board-grid">
          <!-- Header Row -->
          <div class="grid-header left-header">
            <span>의료진</span>
          </div>

          <div class="grid-header second-floor-header">
            <div class="ward-title-group">
              <span class="gender-badge second-floor-badge">2F</span>
              <h2>2층 치료실</h2>
            </div>
          </div>

          <!-- Director 1 Row -->
          <div class="director-left-cell" data-row="1">
            <span class="director-tag" data-row="1">최보빈</span>
            <button class="leave-time-btn" data-row="1">퇴근시간</button>
          </div>

          <div class="slots-container" data-ward="secondFloor" data-director="1">
            <!-- slots dynamically generated by JS -->
          </div>

          <!-- Director 2 Row -->
          <div class="director-left-cell" data-row="2">
            <span class="director-tag" data-row="2">김준현</span>
            <button class="leave-time-btn" data-row="2">퇴근시간</button>
          </div>

          <div class="slots-container" data-ward="secondFloor" data-director="2">
            <!-- slots dynamically generated by JS -->
          </div>

          <!-- Director 3 Row -->
          <div class="director-left-cell" data-row="3">
            <span class="director-tag" data-row="3">김영윤</span>
            <button class="leave-time-btn" data-row="3">퇴근시간</button>
          </div>

          <div class="slots-container" data-ward="secondFloor" data-director="3">
            <!-- slots dynamically generated by JS -->
          </div>

          <!-- Director 4 Row -->
          <div class="director-left-cell" data-row="4">
            <span class="director-tag" data-row="4">박지현</span>
            <button class="leave-time-btn" data-row="4">퇴근시간</button>
          </div>

          <div class="slots-container" data-ward="secondFloor" data-director="4">
            <!-- slots dynamically generated by JS -->
          </div>
          <!-- Vertical Divider Lines -->
          <div class="vertical-divider line-1"></div>
        </div>
      </div>
    </main>

    <!-- Bed Selection Modal (Pop-up Selector) -->
    <div class="modal-overlay" id="bed-modal">
      <div class="modal-card">
        <div class="modal-header">
          <h3 class="modal-title">베드 지정</h3>
        </div>
        <div class="modal-body">
          <p class="modal-instruction">환자가 배정된 베드 번호 또는 특수 항목을 선택하세요.</p>
          
          <div class="modal-section-title">일반 베드</div>
          <div class="bed-grid" id="modal-bed-grid">
            <!-- Buttons dynamically generated by JS -->
          </div>
          
          <div class="modal-section-title">특수 치료 / 상담</div>
          <div class="special-grid" id="modal-special-grid">
            <!-- Buttons dynamically generated by JS -->
          </div>
          
          <div class="modal-section-title">기타</div>
          <div class="special-grid" id="modal-etc-grid">
            <!-- Buttons dynamically generated by JS -->
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-clear" id="btn-clear-slot">비우기 (자석 제거)</button>
          <button class="btn btn-cancel" id="btn-cancel-modal">취소</button>
        </div>
      </div>
    </div>

    <!-- Director Selection Modal -->
    <div class="modal-overlay" id="director-modal">
      <div class="modal-card">
        <div class="modal-header">
          <h3 class="modal-title">의료진 지정</h3>
        </div>
        <div class="modal-body">
          <p class="modal-instruction">해당 행에 배정할 원장님을 선택하세요.</p>
          <div class="director-select-grid" id="modal-director-grid">
            <!-- Buttons dynamically generated by JS -->
          </div>
          <button class="btn-off-duty" id="btn-director-off-duty">퇴근</button>
        </div>
        <div class="modal-footer">
          <button class="btn btn-cancel" id="btn-cancel-director-modal">취소</button>
        </div>
      </div>
    </div>

    <!-- Leave Time Selection Modal -->
    <div class="modal-overlay" id="leave-time-modal">
      <div class="modal-card">
        <div class="modal-header">
          <h3 class="modal-title">퇴근 시간 선택</h3>
        </div>
        <div class="modal-body">
          <p class="modal-instruction">의료진의 퇴근 시간을 선택하세요.</p>
          <div class="director-select-grid" id="modal-leave-time-grid">
            <!-- Buttons dynamically generated by JS -->
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-cancel" id="btn-cancel-leave-modal">취소</button>
        </div>
      </div>
    </div>
    
    <!-- Cancel Progress Confirmation Modal -->
    <div class="modal-overlay" id="cancel-progress-modal">
      <div class="modal-card">
        <div class="modal-header">
          <h3 class="modal-title">치료 진행 취소</h3>
        </div>
        <div class="modal-body">
          <p class="modal-instruction" id="cancel-progress-instruction">'{베드번호}' 배드의 치료 진행을 취소하고 대기 상태로 되돌리시겠습니까?</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-confirm" id="btn-confirm-cancel-progress">대기로 되돌리기</button>
          <button class="btn btn-cancel" id="btn-cancel-progress-modal">취소</button>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript file -->
  <script src="app.js"></script>
</body>
</html>
